{% extends "html/base.html" %}
{% block title %}Health - HomeCare{% endblock %}
{% block content %}
   <div class="layout_padding">
  <h2 class="mb-3 text-center" style="font-weight: 600; color: #2c3e50;">
    🗺️ Mapa de Sedes de Salud - Boyacá
  </h2>

  <!-- 🔹 Contenedor del mapa -->
  <div class="map-container shadow-lg rounded" 
       style="max-width: 100%; margin: 0 auto; padding: 10px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
    
    <div id="map" 
         style="height: 500px; border-radius: 12px; overflow: hidden;">
    </div>
  </div>
</div>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<div class="layout_padding mt-5">
  <h2 class="mb-3 text-center" style="font-weight: 600; color: #2c3e50;">
    🔮 Predicción de Demanda de Servicios de Salud
  </h2>

  <div class="shadow-lg rounded p-3" 
       style="background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15);">
    <canvas id="chartPrediccion" height="120"></canvas>
  </div>
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  /* 🎨 Ajustes solo al mapa */
  #map {
    transition: all 0.3s ease-in-out;
  }
  #map:hover {
    transform: scale(1.01);
  }
  .leaflet-popup-content {
    font-size: 14px;
    color: #2c3e50;
  }
  .leaflet-control-layers {
    background: rgba(255,255,255,0.9);
    border-radius: 8px;
    padding: 5px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
</style>

<script>
  const sedesData = {{ sedes | tojson | safe }};

  const mapaBoyaca = L.map('map').setView([5.7, -73.3], 8);

  const capaOSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  });

  const capaCartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM & CARTO',
    subdomains: 'abcd',
    maxZoom: 20
  });

  const capaCartoVoyager = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM & CARTO',
    subdomains: 'abcd',
    maxZoom: 20
  });

  const capaStamenTerrain = L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/terrain/{z}/{x}/{y}.png', {
    attribution: 'Map tiles by Stamen Design & OSM',
    maxZoom: 18
  });

  capaCartoLight.addTo(mapaBoyaca);

  L.control.layers({
    "OSM Estándar": capaOSM,
    "Carto Light": capaCartoLight,
    "Carto Voyager": capaCartoVoyager,
    "Stamen Terrain": capaStamenTerrain
  }).addTo(mapaBoyaca);

  const iconIndependiente = L.icon({
    iconUrl: "{{ url_for('static', filename='icons/independiente.png') }}",
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -26]
  });

  const iconIPS = L.icon({
    iconUrl: "{{ url_for('static', filename='icons/hospital.png') }}",
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -26]
  });

  const iconTransporte = L.icon({
    iconUrl: "{{ url_for('static', filename='icons/ambulance.png') }}",
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -26]
  });

  const iconOtro = L.icon({
    iconUrl: "{{ url_for('static', filename='icons/other.png') }}",
    iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -26]
  });

  function getIcon(clase) {
    if (!clase) return iconOtro;
    clase = clase.toLowerCase();
    if (clase.includes("profesional independiente")) return iconIndependiente;
    if (clase.includes("instituciones prestadoras")) return iconIPS;
    if (clase.includes("transporte especial")) return iconTransporte;
    if (clase.includes("objeto social diferente")) return iconOtro;
    return iconOtro;
  }

  sedesData.forEach(sede => {
    if (sede.Latitud && sede.Longitud) {
      L.marker([sede.Latitud, sede.Longitud], { icon: getIcon(sede.ClasePrestadorDesc) })
        .addTo(mapaBoyaca)
        .bindPopup(`
          <b>${sede.NombreSede}</b><br>
          ${sede.DireccionSede}<br>
          <i>${sede.MunicipioSedeDesc}</i><br>
          <small><b>Clase:</b> ${sede.ClasePrestadorDesc}</small>
        `);
    }
  });
</script>
{% endblock %}
